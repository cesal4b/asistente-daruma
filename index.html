<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Daruma</title>
<style>
  :root {
    --verde: #1D9E75;
    --verde-osc: #0F6E56;
    --verde-claro: #E1F5EE;
    --texto: #1a2b26;
    --texto-suave: #5a6b66;
    --borde: #e2e8e5;
    --fondo: #f6f9f8;
    --blanco: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--fondo);
    color: var(--texto);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--blanco);
    border-bottom: 1px solid var(--borde);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .logo {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--verde);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .header-text h1 { font-size: 16px; font-weight: 600; }
  .header-text p { font-size: 12px; color: var(--texto-suave); }
  .estado {
    margin-left: auto;
    font-size: 11px;
    color: var(--verde-osc);
    background: var(--verde-claro);
    padding: 4px 10px;
    border-radius: 99px;
    font-weight: 500;
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .chat-inner { max-width: 760px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 14px; }

  .msg { display: flex; gap: 10px; max-width: 88%; line-height: 1.55; font-size: 14.5px; }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .msg.bot .avatar { background: var(--verde); }
  .msg.user .avatar { background: #d4ddd9; }
  .msg .burbuja {
    padding: 11px 15px;
    border-radius: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.bot .burbuja { background: var(--blanco); border: 1px solid var(--borde); border-top-left-radius: 4px; }
  .msg.user .burbuja { background: var(--verde); color: #04342C; border-top-right-radius: 4px; }

  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
  .chip {
    font-size: 12.5px;
    padding: 7px 13px;
    border-radius: 99px;
    border: 1px solid var(--borde);
    background: var(--blanco);
    color: var(--texto-suave);
    cursor: pointer;
    transition: all .15s;
  }
  .chip:hover { border-color: var(--verde); color: var(--verde-osc); background: var(--verde-claro); }

  .typing { display: flex; gap: 4px; padding: 14px 16px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--texto-suave);
    animation: blink 1.3s infinite both;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity: .3; } 40% { opacity: 1; } }

  footer {
    background: var(--blanco);
    border-top: 1px solid var(--borde);
    padding: 14px 20px;
    flex-shrink: 0;
  }
  .input-row { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  textarea {
    flex: 1;
    border: 1px solid var(--borde);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 14.5px;
    font-family: inherit;
    resize: none;
    max-height: 120px;
    outline: none;
    transition: border-color .15s;
  }
  textarea:focus { border-color: var(--verde); }
  .enviar {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: none;
    background: var(--verde);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .enviar:hover { background: var(--verde-osc); }
  .enviar:disabled { opacity: .5; cursor: not-allowed; }
  .aviso { max-width: 760px; margin: 8px auto 0; font-size: 11px; color: var(--texto-suave); text-align: center; }

  @media (max-width: 600px) {
    .msg { max-width: 95%; }
    main { padding: 14px; }
  }

  /* --- Pantalla de acceso --- */
  #pantalla-acceso {
    position: fixed; inset: 0;
    background: var(--fondo);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
  }
  .acceso-card {
    background: var(--blanco);
    border: 1px solid var(--borde);
    border-radius: 18px;
    padding: 40px 36px;
    width: 100%; max-width: 360px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,.07);
  }
  .acceso-logo {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: var(--verde);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .acceso-card h2 { font-size: 18px; font-weight: 700; text-align: center; }
  .acceso-card p  { font-size: 13px; color: var(--texto-suave); text-align: center; margin-top: -10px; }
  .acceso-card input[type="password"] {
    width: 100%;
    border: 1px solid var(--borde);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
    text-align: center;
    letter-spacing: 3px;
  }
  .acceso-card input[type="password"]:focus { border-color: var(--verde); }
  .acceso-card button {
    width: 100%;
    background: var(--verde);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .acceso-card button:hover { background: var(--verde-osc); }
  .acceso-error {
    font-size: 12.5px;
    color: #c0392b;
    display: none;
  }
</style>
</head>
<body>

  <!-- Pantalla de acceso -->
  <div id="pantalla-acceso">
    <div class="acceso-card">
      <div class="acceso-logo">🤖</div>
      <h2>Asistente Daruma</h2>
      <p>Ingresa la clave de acceso para continuar</p>
      <input type="password" id="campo-clave" placeholder="••••••" maxlength="30" />
      <span class="acceso-error" id="error-clave">Clave incorrecta. Intenta de nuevo.</span>
      <button id="btn-acceso">Ingresar</button>
    </div>
  </div>

  <header>
    <div class="logo">🤖</div>
    <div class="header-text">
      <h1>Asistente Daruma</h1>
      <p>Guía interna del sistema QMS</p>
    </div>
    <span class="estado">En línea</span>
  </header>

  <main id="chat">
    <div class="chat-inner" id="chat-inner"></div>
  </main>

  <footer>
    <div class="input-row">
      <textarea id="entrada" rows="1" placeholder="Escribe tu pregunta sobre Daruma..."></textarea>
      <button class="enviar" id="btn-enviar" aria-label="Enviar">➤</button>
    </div>
    <p class="aviso">Asistente interno. Verifica siempre en la instancia de Entrenamiento antes de Producción.</p>
  </footer>

<script>
  // ── Clave de acceso ── cámbiala aquí cuando quieras
  const CLAVE_ACCESO = 'daruma2024';

  const pantallaAcceso = document.getElementById('pantalla-acceso');
  const campoClave    = document.getElementById('campo-clave');
  const btnAcceso     = document.getElementById('btn-acceso');
  const errorClave    = document.getElementById('error-clave');

  function verificarClave() {
    if (campoClave.value === CLAVE_ACCESO) {
      pantallaAcceso.style.display = 'none';
      entrada.focus();
    } else {
      errorClave.style.display = 'block';
      campoClave.value = '';
      campoClave.focus();
    }
  }

  btnAcceso.addEventListener('click', verificarClave);
  campoClave.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') verificarClave();
  });

  // ── Chat ──
  const chatInner = document.getElementById('chat-inner');
  const entrada = document.getElementById('entrada');
  const btnEnviar = document.getElementById('btn-enviar');

  let historial = [];
  let cargando = false;

  const moduloSugerencias = [
    'Oportunidades', 'Planes de Acción', 'Riesgos',
    'Gestión Documental', 'Auditorías', 'Procesos'
  ];

  function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
  }

  function agregarMensaje(texto, tipo) {
    const msg = document.createElement('div');
    msg.className = 'msg ' + tipo;
    const avatar = tipo === 'bot' ? '🤖' : '🙋';
    msg.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="burbuja">${escapeHtml(texto)}</div>
    `;
    chatInner.appendChild(msg);
    scrollAbajo();
    return msg;
  }

  function agregarChips() {
    const cont = document.createElement('div');
    cont.className = 'chips';
    moduloSugerencias.forEach(m => {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = m;
      chip.onclick = () => {
        entrada.value = '¿Cómo funciona el módulo de ' + m + '?';
        enviar();
      };
      cont.appendChild(chip);
    });
    chatInner.appendChild(cont);
    scrollAbajo();
  }

  function mostrarTyping() {
    const t = document.createElement('div');
    t.className = 'msg bot';
    t.id = 'typing-indicator';
    t.innerHTML = `<div class="avatar">🤖</div><div class="burbuja"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chatInner.appendChild(t);
    scrollAbajo();
  }

  function quitarTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  function scrollAbajo() {
    const main = document.getElementById('chat');
    main.scrollTop = main.scrollHeight;
  }

  async function enviar() {
    const texto = entrada.value.trim();
    if (!texto || cargando) return;

    agregarMensaje(texto, 'user');
    historial.push({ role: 'user', content: texto });
    entrada.value = '';
    entrada.style.height = 'auto';
    cargando = true;
    btnEnviar.disabled = true;
    mostrarTyping();

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: historial }),
      });

      quitarTyping();
      const data = await resp.json();

      if (!resp.ok) {
        agregarMensaje(data.error || 'Ocurrió un error. Intenta de nuevo.', 'bot');
      } else {
        agregarMensaje(data.reply, 'bot');
        historial.push({ role: 'assistant', content: data.reply });
      }
    } catch (e) {
      quitarTyping();
      agregarMensaje('No pude conectar con el asistente. Revisa tu conexión e intenta de nuevo.', 'bot');
    } finally {
      cargando = false;
      btnEnviar.disabled = false;
      entrada.focus();
    }
  }

  btnEnviar.onclick = enviar;
  entrada.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      enviar();
    }
  });
  entrada.addEventListener('input', () => {
    entrada.style.height = 'auto';
    entrada.style.height = Math.min(entrada.scrollHeight, 120) + 'px';
  });

  agregarMensaje('Hola, soy tu asistente de Daruma. Puedo guiarte paso a paso en cualquiera de los 6 módulos del sistema. ¿En qué te ayudo hoy?', 'bot');
  agregarChips();
  entrada.focus();
</script>
</body>
</html>
